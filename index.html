<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derived Results | Secure Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=7">
<style>
body { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--sidebar); margin: 0; font-family: 'Hanken Grotesk', system-ui, sans-serif; overflow: hidden; }
.login-card { background: var(--surface); padding: 2.5rem; border-radius: 12px; text-align: center; width: 380px; border: 1px solid var(--line); box-shadow: 0 18px 40px rgba(0,0,0,0.35); }
.login-input { width: 100%; padding: 12px; margin: 1.2rem 0 0.5rem 0; border: 1px solid var(--line-2); border-radius: 8px; text-align: center; font-size: 1.05rem; font-weight: 500; font-family: inherit; box-sizing: border-box; color: var(--ink); background: var(--surface); }
.login-input:focus { outline: none; border-color: var(--accent); }
.btn-login { background: var(--accent); color: var(--surface); padding: 12px; width: 100%; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.92rem; font-family: inherit; margin-top: 1rem; letter-spacing: 0.04em; }
.btn-login:hover { filter: brightness(0.95); }
.login-hint { font-size: 0.72rem; color: var(--faint); margin-top: 1.4rem; font-weight: 500; }
.login-links { display: flex; justify-content: center; gap: 1.5rem; margin-top: 1.2rem; }
.login-links a { font-size: 0.75rem; font-weight: 600; color: var(--accent); text-decoration: none; opacity: 0.85; }
.login-links a:hover { opacity: 1; text-decoration: underline; }
</style>
</head>
<body>
<div class="login-card">
    <h1 style="color:var(--ink); font-weight:600; margin:0 0 0.2rem 0; font-size: 1.3rem; letter-spacing:0.18em;">DERIVED&nbsp;RESULTS</h1>
    <p style="font-size: 0.72rem; color: var(--faint); font-weight: 500; margin:0 0 0.5rem 0; letter-spacing:0.14em; text-transform:uppercase;">Network Dashboard</p>
    <label for="passcode" class="sr-only">Practice access code</label>
    <input type="password" id="passcode" class="login-input" placeholder="••••" onkeydown="if(event.key==='Enter') checkAuth()">
    <button onclick="checkAuth()" class="btn-login">ENTER DASHBOARD</button>
    <p id="errMsg" style="color:#D6001C; font-size:0.75rem; margin-top:12px; font-weight:700; display:none;">ACCESS DENIED</p>
    <div class="login-links">
        <a href="#">Forgot Username</a>
        <a href="#">Forgot Password</a>
    </div>
</div>
<script>
function checkAuth() {
    if(document.getElementById('passcode').value === 'DR2026') {
        sessionStorage.setItem('isAuth', 'true');
        window.location.href = 'dashboard.html?view=DR_BRAD&tier=daily';
    } else {
        document.getElementById('errMsg').style.display = 'block';
    }
}
</script>
</body>
</html>
