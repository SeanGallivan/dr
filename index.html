<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>ADX | Derived Results Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .gate-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 320px; border-top: 4px solid #002D72; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #002D72; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #001f4d; }
        .error { color: #D6001C; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="gate-card">
        <h2 style="color: #002D72;">ADX Prototype</h2>
        <p>Enter the access code to view the environment.</p>
        <input type="password" id="gatePass" placeholder="Access Code">
        <button onclick="checkPass()">Unlock Prototype</button>
        <div id="errorMsg" class="error">Invalid code. Please try again.</div>
    </div>
    <script>
        function checkPass() {
            const pass = document.getElementById('gatePass').value;
            // Access Code: ADX2026
            if (pass === 'ADX2026') { 
                localStorage.setItem('dr_access', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
