<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>ADX | Derived Results Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .gate-card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; border-top: 6px solid #002D72; }
        h2 { color: #002D72; margin-bottom: 1rem; }
        input { width: 100%; padding: 14px; margin: 20px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: #002D72; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .error { color: #D6001C; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="gate-card">
        <h2>ADX Prototype</h2>
        <p>Enter access code</p>
        <input type="password" id="gatePass" placeholder="Access Code">
        <button onclick="checkPass()">Unlock Environment</button>
        <div id="errorMsg" class="error">Invalid Access Code.</div>
    </div>
    <script>
        function checkPass() {
            if (document.getElementById('gatePass').value === 'ADX2026') { 
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
