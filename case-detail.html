<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derived Results | Case Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=9">
</head>
<body style="overflow:auto;">
    <a href="#detailBody" class="skip-link">Skip to main content</a>
    <header>
        <div class="header-brand">
            <a class="logo-area" href="dashboard.html?view=DR_BRAD&tier=daily">DERIVED&nbsp;RESULTS</a>
            <span class="adx-brand-sep"></span>
            <span class="adx-eyebrow">Case Detail</span>
        </div>
        <div class="adx-header-right">
            <button id="adxThemeToggle" class="adx-theme-toggle" onclick="adxToggleTheme()"
                    aria-label="Toggle light / dark theme" aria-pressed="false" type="button">
                <span class="knob">☀</span>
            </button>
            <div class="adx-avatar" aria-hidden="true">BV</div>
        </div>
    </header>
    <div id="detailHeader" class="detail-header"></div>
    <main id="detailBody" class="adx-detail-body" tabindex="-1"></main>

    <script src="./adx-data.js?v=9"></script>
    <script src="./adx-config.js?v=9"></script>
    <script>
    (function () {
        var params = new URLSearchParams(location.search);
        var view = params.get("view") || "DR_BRAD";
        var c = adxCase(params.get("id")) || ADX_CASES[0];
        var ipm = adxProvider(c.ipmId);
        var payer = adxPayer(c.payerId);
        var client = adxClient(c.clientId);
        var role = (adxProvider(view) || {}).role || "admin";
        var term = role === "admin" ? "Beneficiary" : "Patient";
        function money(n){ return "$" + Number(n).toLocaleString(); }
        function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

        document.title = "ADX | " + c.beneficiary + " — Case Detail";

        // A patient can have multiple diagnoses / episodes (same person, different case).
        var allEpisodes = ADX_CASES.filter(function(x){ return x.beneficiary === c.beneficiary && x.dob === c.dob; })
            .sort(function(a,b){ return a.id < b.id ? -1 : 1; });
        var dxIndex = allEpisodes.findIndex(function(x){ return x.id === c.id; }) + 1;
        var multiTag = allEpisodes.length > 1 ? ' · Diagnosis ' + dxIndex + ' of ' + allEpisodes.length : '';

        // PIFS follow-up due status — deterministic per case so it's stable across reloads.
        // Most cases show a countdown (1–29 days); ~1 in 5 is overdue and rendered bright.
        var pifsSeed = 0; for (var _p = 0; _p < c.id.length; _p++) pifsSeed = (pifsSeed * 31 + c.id.charCodeAt(_p)) % 100000;
        var pifsOverdue = (pifsSeed % 5 === 0);
        var pifsDays = pifsOverdue ? (1 + pifsSeed % 12) : (1 + pifsSeed % 29);
        var pifsPlural = (pifsDays === 1) ? "" : "s";
        var pifsDueText = pifsOverdue
            ? "Follow-up OVERDUE — " + pifsDays + " day" + pifsPlural
            : "Follow-up due in " + pifsDays + " day" + pifsPlural;
        var pifsDueStyle = pifsOverdue
            ? "margin-top:2px;background:#e5484d;color:#fff;padding:3px 10px;border-radius:999px;font-weight:800;font-size:0.68rem;letter-spacing:0.04em;box-shadow:0 0 12px rgba(229,72,77,0.6);"
            : "margin-top:2px;opacity:0.75;font-weight:600;font-size:0.72rem;letter-spacing:0.02em;";

        document.getElementById("detailHeader").innerHTML =
            '<div><h2 style="margin:0;">' + esc(c.beneficiary) + (c.newIntake ? ' <span class="adx-pill adx-pill-new" style="vertical-align:middle;">NEW INTAKE</span>' : '') + '</h2>' +
            '<div style="font-size:0.85rem; opacity:0.85; margin-top:4px;">' + term + ' · DOB ' + c.dob + ' · Age ' + c.age + ' · Case ' + c.id + multiTag + '</div></div>' +
            '<div class="header-actions">' +
            '<div style="display:flex; flex-direction:column; align-items:flex-end; gap:2px;">' +
            '<button class="btn btn-action" onclick="alert(\'PIFS follow-up assessment sent to ' + esc(c.beneficiary) + '. It will surface in the pain areas below when returned. Automatic 30-day follow-ups are on.\')">Send PIFS Follow-Up</button>' +
            '<span style="' + pifsDueStyle + '">' + pifsDueText + '</span>' +
            '</div>' +
            '<button class="btn btn-action" onclick="alert(\'Message sent to ' + esc(ipm.name) + '.\')">Message Doctor</button></div>';

        // Patient-level: every diagnosis is its own patient/diagnosis pair.
        // Progress, tracking, and bonus are shown per pair and aggregated.
        var patientAgg = aggregateBonus(allEpisodes);
        var patientSumRT = allEpisodes.reduce(function(s,x){ return s + x.runningTotal; }, 0);
        var patientDxRows = allEpisodes.map(function(x){
            var g = x.pifCurrent - x.pifStart;
            var isCur = x.id === c.id;
            var dxCell = isCur
                ? '<strong>' + esc(x.diagnosis) + '</strong> <span class="adx-episode-now">(viewing)</span>'
                : '<a class="adx-link" href="case-detail.html?id=' + x.id + '&view=' + view + '">' + esc(x.diagnosis) + '</a>';
            return '<tr' + (isCur ? ' class="adx-row-current"' : '') + '>' +
                '<td data-label="Diagnosis">' + dxCell + '</td>' +
                '<td data-label="Phase">' + esc(x.diagnosisStatus) + ' · ' + esc(x.status) + '</td>' +
                '<td data-label="PIFs" style="text-align:right;"><span class="adx-mono">' + x.pifStart + '→' + x.pifCurrent + ' <span class="' + (g>0?"adx-ok-text":"adx-muted") + '">' + (g>0?"+"+g:(g<0?g:"±0")) + '</span></span></td>' +
                '<td data-label="Aging" style="text-align:right;"><span class="adx-mono">' + x.agingDays + '</span></td>' +
                '<td data-label="Running Total" style="text-align:right;"><span class="adx-money">' + money(x.runningTotal) + '</span></td>' +
                '<td data-label="Bonus Pts" style="text-align:right;"><span class="adx-mono">' + caseBonusPoints(x) + '</span></td>' +
                '</tr>';
        }).join("");
        var patientDxSection =
            '<div class="section-header"><h3>Diagnoses — Progress, Tracking &amp; Bonus ' + adxInfo("bonus-points") + ' <span style="font-size:0.62rem; font-weight:800; color:#888;">[DR]</span></h3></div>' +
            '<p class="adx-sub">Each diagnosis is its own patient/diagnosis pair. Bonus is the aggregate of the pairs below, not collapsed to the patient. &nbsp;<a class="adx-link" href="pif-survey.html?patient=1">Preview the redesigned PIF follow-up survey ▸</a></p>' +
            '<table class="adx-table"><thead><tr><th scope="col">Diagnosis</th><th scope="col">Phase · Status ' + adxInfo("status") + '</th>' +
                '<th scope="col" style="text-align:right;">PIFs ' + adxInfo("pif") + '</th><th scope="col" style="text-align:right;">Aging ' + adxInfo("aging") + '</th>' +
                '<th scope="col" style="text-align:right;">Running Total ' + adxInfo("running-total") + '</th><th scope="col" style="text-align:right;">Bonus Pts ' + adxInfo("bonus-points") + '</th></tr></thead><tbody>' +
                patientDxRows +
                '<tr class="adx-total-row"><td><strong>All diagnoses (' + allEpisodes.length + ')</strong></td><td></td><td></td><td></td>' +
                    '<td style="text-align:right;"><span class="adx-money">' + money(patientSumRT) + '</span></td>' +
                    '<td style="text-align:right;"><span class="adx-mono"><strong>' + patientAgg.total + '</strong></span></td></tr>' +
            '</tbody></table>' +
            '<p class="adx-sub">Aggregate bonus: <strong>' + patientAgg.total + ' pts</strong> across ' + patientAgg.count + ' diagnosis pair' + (patientAgg.count !== 1 ? 's' : '') + ' · avg ' + patientAgg.avg + '/pair · <strong>' + (patientAgg.eligible ? 'Eligible' : 'Not yet') + '</strong> (need ' + ADX_BONUS_POINTS_THRESHOLD + '/pair) ' + adxInfo("bonus") + '</p>' +
            /* B11/B12: send / re-take trigger + auto cadence; in-office (staff) fill de-emphasized. */
            '<p class="adx-sub">PIFS follow-up: <strong>automatic every 30 days</strong> · <a class="adx-link" href="#" onclick="alert(\'PIFS follow-up sent to ' + esc(c.beneficiary) + '. Results surface in the pain areas when returned.\');return false;">Send now</a> · <a class="adx-link" href="pif-survey.html?staff=1&patient=' + (c.newIntake ? '3' : '1') + '&name=' + encodeURIComponent(c.beneficiary) + '" target="_blank" rel="noopener" style="opacity:0.75;">complete in office ▸</a></p>';

        var costTotal = c.costBreakdown.reduce(function(s,x){ return s + x.amount; }, 0);
        var gain = c.pifCurrent - c.pifStart;

        // Time to MBT (C1b): actual for closed cases, elapsed/in-progress otherwise.
        function daysBetween(a,b){ return Math.round((new Date(b) - new Date(a)) / 86400000); }
        var firstVisit = c.visits[0].date, lastVisit = c.visits[c.visits.length-1].date;
        var mbtReached = c.status === "Inactive complete";
        var timeToMbt = mbtReached ? daysBetween(firstVisit, lastVisit) : daysBetween(firstVisit, "2026-06-18");
        var mbtDisplay = mbtReached ? (timeToMbt + " days") : (timeToMbt + " days");
        var mbtSub = mbtReached ? "Reached MBT" : "In progress";

        // PIFs trend across visits (G1): carry forward the last recorded PIF.
        var lastPif = c.pifStart;
        var pifSeries = c.visits.map(function(v){ var m=(v.note||"").match(/PIF (\d+)/); if(m) lastPif=parseInt(m[1],10); return { date:v.date, pif:lastPif }; });
        var pifCeil = Math.max(c.pifTarget || 10, c.pifCurrent);

        var payerCard = (role === "admin" || role === "ipm")
            ? '<div class="deep-card"><h4>Payer <span style="font-weight:600;">[Salesforce]</span></h4><p>' + esc(payer.name) + (payer.reminderRequired ? ' <span class="adx-pill adx-pill-warn">SLOW PAYER</span>' : '') + '</p></div>'
            : '';

        var html =
            '<a class="adx-back" href="dashboard.html?view=' + view + '&tier=daily"><span aria-hidden="true">←</span> Back to dashboard</a>' +
            patientDxSection +

            '<div class="section-header"><h3>Diagnosis Detail — ' + esc(c.diagnosis) + '</h3></div>' +
            '<div class="visit-context">' +
                '<span class="ctx-badge navy">' + esc(c.diagnosisStatus) + '</span>' +
                '<span class="ctx-badge ' + (c.status === "Active" ? "green" : c.status === "Maintenance" ? "yellow" : "muted") + '">' + esc(c.status) + '</span>' +
                '<span class="ctx-sep"></span>' +
                '<span class="ctx-badge muted">IPM: ' + esc(ipm.name) + '</span>' +
                '<span class="ctx-badge muted">Client: ' + esc(client.name) + '</span>' +
            '</div>' +

            '<div class="daily-grid">' +
                '<div class="daily-stat"><span class="stat-label">Running Total Spent ' + adxInfo("running-total") + '</span><span class="stat-value" style="font-size:2rem;">' + money(c.runningTotal) + '</span></div>' +
                '<div class="daily-stat"><span class="stat-label">PIFs (start → now) ' + adxInfo("pif") + '</span><span class="stat-value" style="font-size:2rem;">' + c.pifStart + ' → ' + c.pifCurrent + ' <span class="adx-pif-' + (gain>0?'up':gain<0?'down':'flat') + '" style="font-size:1rem;">' + (gain>0?'▲ +':gain<0?'▼ ':'▬ ') + gain + '</span></span><span style="font-size:0.7rem; color:#888;">Patient-identified · Target: ' + c.pifTarget + '</span></div>' +
                '<div class="daily-stat"><span class="stat-label">Time to MBT ' + adxInfo("time-to-mbt") + '</span><span class="stat-value" style="font-size:2rem;">' + mbtDisplay + '</span><span style="font-size:0.7rem; color:#888;">' + mbtSub + '</span></div>' +
                '<div class="daily-stat"><span class="stat-label">Aging ' + adxInfo("aging") + '</span><span class="stat-value" style="font-size:2rem;">' + c.agingDays + ' <span style="font-size:0.9rem;">days</span></span></div>' +
                '<div class="daily-stat ' + (c.scheduling==="No-show"?"alert":"") + '"><span class="stat-label">Scheduling ' + adxInfo("scheduling") + '</span><span class="stat-value" style="font-size:1.5rem;">' + esc(c.scheduling) + '</span></div>' +
            '</div>' +

            '<div class="section-header"><h3>Plan <span style="font-size:0.62rem; font-weight:800; color:#888;">[DR]</span></h3></div>' +
            '<div class="inherited-data-box"><p style="margin:0; font-weight:600;">' + esc(c.planNote) + '</p>' +
            '<div class="visit-actions" style="border-top:none; padding-bottom:0;">' +
                '<button class="btn-visit primary" onclick="alert(\'Opens plan notes.\')">Open Plan Notes</button>' +
                '<button class="btn-visit outline" onclick="alert(\'Flagged: get this moving.\')">Get This Moving</button>' +
                (c.scheduling==="No-show" ? '<button class="btn-visit alert" onclick="alert(\'No-show flagged — ADX outreach requested.\')">Flag No-Show / Request Outreach</button>' : '') +
            '</div></div>' +

            '<div class="section-header"><h3>Running Total — Cost Accumulation <span style="font-size:0.62rem; font-weight:800; color:#888;">[DR / FHIR]</span></h3></div>' +
            '<table class="table-custom adx-cost-table">' +
                '<thead><tr><th>Item</th><th>Source</th><th>Amount</th></tr></thead><tbody>' +
                c.costBreakdown.map(function(x){ var fhir = x.source === "FHIR"; return '<tr class="' + (fhir ? "adx-fhir-row" : "") + '"><td>' + esc(x.item) + (fhir ? ' <span class="adx-auto-badge">auto-captured</span>' : '') + '</td><td><span class="adx-src-tag src-' + (fhir ? "fhir" : "dr") + '">[' + x.source + ']</span></td><td>' + money(x.amount) + '</td></tr>'; }).join("") +
                '<tr class="adx-cost-total"><td><strong>Running Total</strong></td><td></td><td>' + money(costTotal) + '</td></tr>' +
                '</tbody></table>' +

            ((role==="admin"||role==="ipm") ?
                '<div class="section-header"><h3>Performance vs Network</h3></div>' +
                '<div class="deep-grid" style="grid-template-columns:1fr 1fr;">' +
                    '<div class="deep-card ' + (c.vsNetworkDays>0?"alert-card":"") + '"><h4>Days in ADX vs Network Norm</h4><p class="adx-big ' + (c.vsNetworkDays>0?"adx-warn-text":"") + '">' + (c.vsNetworkDays>=0?"+":"−") + Math.abs(c.vsNetworkDays) + ' days</p><span style="font-size:0.78rem; color:#888;">Network norm: ' + ADX_NETWORK_NORMS.avgDaysInADX + ' days</span></div>' +
                    '<div class="deep-card ' + (c.vsNetworkCost>0?"alert-card":"") + '"><h4>Cost vs Network Norm</h4><p class="adx-big ' + (c.vsNetworkCost>0?"adx-warn-text":"") + '">' + (c.vsNetworkCost>=0?"+$":"−$") + Math.abs(c.vsNetworkCost).toLocaleString() + '</p><span style="font-size:0.78rem; color:#888;">Like-for-like comparable cases</span></div>' +
                '</div>' : '') +

            '<div class="section-header"><h3>Outcome Trend — PIFs over visits ' + adxInfo("pif") + ' <span style="font-size:0.62rem; font-weight:800; color:#888;">[DR]</span></h3></div>' +
            '<div class="adx-trend" role="img" aria-label="PIFs trend across ' + pifSeries.length + ' visits, from ' + c.pifStart + ' to ' + c.pifCurrent + ' against a target of ' + c.pifTarget + '">' +
                pifSeries.map(function(s,i){ return '<div class="adx-trend-col"><div class="adx-trend-bar" style="height:' + Math.max(6, Math.round(s.pif / pifCeil * 100)) + '%"><span class="adx-trend-val">' + s.pif + '</span></div><div class="adx-trend-x">V' + (i+1) + '</div></div>'; }).join("") +
                '<div class="adx-trend-target"><span>Target ' + c.pifTarget + '</span></div>' +
            '</div>' +

            '<div class="section-header"><h3>Visit History <span style="font-size:0.62rem; font-weight:800; color:#888;">[DR / FHIR]</span></h3></div>' +
            '<ul class="adx-timeline">' +
                c.visits.map(function(v, idx){ return { v: v, idx: idx }; }).reverse().map(function(o){ var v = o.v; var fhir = v.source === "FHIR";
                    return '<li class="' + (fhir ? "adx-fhir-row" : "") + '"><div class="tl-date"><a class="adx-link" href="visit-detail.html?case=' + c.id + '&i=' + o.idx + '&view=' + view + '">' + esc(v.date) + '</a> <span class="adx-src-tag src-' + (fhir ? "fhir" : "dr") + '">[' + v.source + ']</span>' + (fhir ? ' <span class="adx-auto-badge">auto-captured</span>' : '') + '</div><div class="tl-note">' + esc(v.note) + '</div></li>'; }).join("") +
            '</ul>' +

            '<div class="section-header"><h3>Care Team &amp; Coverage</h3></div>' +
            '<div class="deep-grid">' +
                '<div class="deep-card"><h4>Assigned IPM (Coordinator)</h4><p><a class="adx-link" href="provider-detail.html?id=' + ipm.id + '&view=' + view + '">' + esc(ipm.name) + '</a> — ' + esc(ipm.specialty) + '</p></div>' +
                '<div class="deep-card"><h4>Treating Doctors</h4><p>' + (c.teamProviderIds.map(function(id){ var p=adxProvider(id); return '<a class="adx-link" href="provider-detail.html?id=' + id + '&view=' + view + '">' + esc(p.name) + '</a>'; }).join("<br>") || "—") + '</p></div>' +
                payerCard +
                '<div class="deep-card"><h4>Referral Source / Client <span style="font-weight:600;">[Salesforce]</span></h4><p><a class="adx-link" href="referral-detail.html?id=' + client.id + '&view=' + view + '">' + esc(client.name) + '</a> — ' + esc(client.type) + '</p></div>' +
            '</div>';

        document.getElementById("detailBody").innerHTML = html;
    })();
    </script>
</body>
</html>
