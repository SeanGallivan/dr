            <div class="content-grid" id="detailBody"></div>

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('#topNav a').forEach(a => { a.classList.remove('active'); a.removeAttribute('aria-current'); });
        document.getElementById(`nav-${mode}`).classList.add('active');
        document.getElementById(`nav-${mode}`).setAttribute('aria-current', 'page');
        const search = document.getElementById('searchBox');
        const addBtn = document.getElementById('addBtn');
        search.placeholder = mode === 'patients' ? "Search Patients..." : "Search Practices...";
        addBtn.classList.toggle('hidden', mode === 'patients');
        renderSidebar();
        renderDashboard();
        clearSelection();
    }

    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        const items = currentMode === 'patients' ? patients : practices;
        list.innerHTML = items.map(i => `
            <button class="list-item" onclick="selectItem('${i.id}')" id="item-${i.id}" aria-label="View details for ${i.name}">
                <span class="item-main">${i.name}</span>
                <span class="item-sub">${currentMode === 'patients' ? 'Last Seen: ' + i.last : 'Avg Days to 1st Visit: ' + i.days}</span>
            </button>
        `).join('');
    }

    function renderDashboard() {
        const title = document.getElementById('overviewTitle');
        const sub = document.getElementById('overviewSub');
        const stats = document.getElementById('dashStats');
        if (currentMode === 'patients') {
            title.innerText = "Summit Musculoskeletal Group";
            sub.innerText = "Practice Performance Overview";
            stats.innerHTML = `
                <div class="stat-item"><span class="stat-label">Patients</span><span class="stat-value">134</span><a href="#" class="stat-label" style="text-decoration:none; font-size:0.7rem;">View Report →</a></div>

            title.innerText = "Network Practices";
            sub.innerText = "Global Practice Distribution";
            stats.innerHTML = `
                <div class="stat-item"><span class="stat-label">Total Practices</span><span class="stat-value">18</span><a href="#" class="stat-label" style="text-decoration:none; font-size:0.7rem;">Manage Network →</a></div>

                <div class="stat-item"><span class="stat-label">Total Billing</span><span class="stat-value">$142,000</span><a href="#" class="stat-label" style="text-decoration:none; font-size:0.7rem;">Revenue Dashboard →</a></div>`;
        }
    }

        activeItem.classList.add('active');
        activeItem.setAttribute('aria-selected', 'true');
        document.getElementById('overviewContainer').classList.add('hidden');
        document.getElementById('detailContainer').classList.remove('hidden');
        const header = document.getElementById('detailHeader');
        const tabs = document.getElementById('detailTabs');
        const body = document.getElementById('detailBody');

        if (currentMode === 'patients') {
            const p = patients.find(i => i.id === id);
            header.innerHTML = `<div><h2 id="vName" style="margin:0; font-size:1.8rem;">${p.name}</h2><div style="margin-top:8px; font-weight:600; background:rgba(255,255,255,0.2); padding:6px 12px; border-radius:4px; display:inline-block;">${p.sched ? '<a class="schedule-link">Schedule Next Visit →</a>' : 'Next Visit: ' + p.next}</div></div><div class="header-meta">ID: ${p.id}</div><div class="header-meta">DOB: ${p.dob}</div><div class="header-meta">Age: ${p.age}</div>`;
            tabs.innerHTML = `<button class="tab active" role="tab" aria-selected="true">Information</button><button class="tab" role="tab">Evaluation & Treatment</button><button class="tab" role="tab">Imaging</button>`;

                <div class="right-col"><div class="data-section"><h3>Quick Actions</h3><div class="btn-group"><button class="btn btn-primary">Add Visit</button><button class="btn btn-outline" style="margin-top:10px;">Add Note</button><button class="btn btn-outline" style="margin-top:10px;">Message</button></div></div><div class="data-section"><h3>Active Diagnoses</h3><p style="font-weight:700; color:var(--primary-navy);">M54.16 - Radiculopathy, lumbar region</p><p style="font-weight:700; color:var(--primary-navy);">M51.26 - Disc displacement</p></div></div>`;
        } else {

            header.innerHTML = `<div><h2 id="vName" style="margin:0; font-size:1.8rem;">${pr.name}</h2><div style="margin-top:5px; opacity:0.8;">Average Pipeline: ${pr.days} Days to 1st Visit</div></div>`;

    function clearSelection() {
        document.getElementById('overviewContainer').classList.remove('hidden');
        document.getElementById('detailContainer').classList.add('hidden');
        document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
