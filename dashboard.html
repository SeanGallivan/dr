<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derived Results | Network Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=6">
</head>
<body>
    <a href="#adxMain" class="skip-link">Skip to main content</a>
    <header>
        <div class="header-brand">
            <a class="logo-area" href="dashboard.html?view=DR_BRAD&tier=daily">DERIVED&nbsp;RESULTS</a>
            <span class="adx-brand-sep"></span>
            <span class="adx-eyebrow">Network Dashboard</span>
        </div>
        <div class="adx-header-right">
            <nav id="topNav" aria-label="Tier navigation"></nav>
            <button id="adxThemeToggle" class="adx-theme-toggle" onclick="adxToggleTheme()"
                    aria-label="Toggle light / dark theme" aria-pressed="false" type="button">
                <span class="knob">☀</span>
            </button>
            <div class="adx-avatar" aria-hidden="true">BV</div>
        </div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" aria-label="View-as provider navigation">
            <div class="adx-current-view">
                <span class="adx-current-label">Current view</span>
                <span class="adx-current-title" id="adxRoleTitle"></span>
                <span class="adx-current-who" id="adxRoleWho"></span>
            </div>
            <nav class="list-container" id="adxNav"></nav>
        </aside>

        <main tabindex="-1">
            <div id="adxMain" class="adx-content"><!-- rendered by adx-app.js --></div>
        </main>
    </div>

    <div id="adxToast" class="adx-toast" role="status" aria-live="polite"></div>

    <script src="./adx-data.js"></script>
    <script src="./adx-config.js"></script>
    <script src="./adx-app.js"></script>
</body>
</html>
