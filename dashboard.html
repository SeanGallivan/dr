<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derived Results | Unified Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<a href="#mainContent" class="skip-link">Skip to main content</a>

<header role="banner">
    <a href="javascript:void(0)" class="logo-area" onclick="switchMode('patients')" aria-label="Derived Results Home">Derived Results</a>
    <nav id="topNav" aria-label="Main Navigation">
        <a href="javascript:void(0)" onclick="switchMode('patients')" id="nav-patients" class="active" aria-current="page">Dashboard</a>
        <a href="javascript:void(0)" onclick="switchMode('practices')" id="nav-practices">Practices</a>
        <a href="#" style="color:var(--secondary-red); margin-left: 4rem;">Sign Out</a>
    </nav>
</header>

<div class="wrapper">
    <aside class="sidebar">
        <div class="search-container">
            <label for="searchBox" class="sr-only">Search</label>
            <input type="text" id="searchBox" placeholder="Search Patients...">
            <button id="addBtn" class="btn btn-primary hidden" style="width:100%; margin-top:15px;">+ Add New Practice</button>
        </div>
        <nav class="list-container" id="sidebarList" aria-label="Entity List"></nav>
    </aside>

    <main id="mainContent" role="main" tabindex="-1">
        <div id="overviewContainer" class="view-section">
            <h1 id="overviewTitle" style="font-weight: 800; font-size: 2.8rem; margin:0; color:var(--primary-navy);"></h1>
            <p id="overviewSub" style="color:var(--text-muted); font-weight:600; margin-top:0.8rem;"></p>
            
            <div id="overviewData">
                </div>
        </div>

        <section id="detailContainer" class="hidden">
            <div id="detailHeader" class="detail-header"></div>
            <div id="detailContent" class="view-section" style="padding-top: 2rem; background:white;">
                <a onclick="clearSelection()" class="back-link">← Back to Dashboard</a>
                <div id="detailHierarchy"></div>
            </div>
        </section>
    </main>
</div>

<script>
    let currentMode = 'patients';

    const patients = [
        { id: "P1", name: "Elizabeth Blackwell", dob: "8/27/1984", age: 41, complaint: "Chronic Lower Back Pain", allergies: "Penicillins", meds: "Naproxen 500mg, Gabapentin", vitals: "128/82 | 72bpm", sub: "Last Seen: Feb 24" },
        { id: "P2", name: "Jonas Salk", dob: "10/28/1975", age: 50, complaint: "Post-Op Follow-up (Lumbar)", allergies: "Latex", meds: "Oxycodone (PRN), Aspirin", vitals: "135/88 | 78bpm", sub: "Last Seen: Feb 22" },
        { id: "P3", name: "Virginia Apgar", dob: "6/07/1981", age: 44, complaint: "Right Hip Flare-up", allergies: "None", meds: "Ibuprofen", vitals: "120/75 | 68bpm", sub: "Last Seen: Feb 19" }
    ];

    const practices = [
        { id: "PR1", name: "Summit Musculoskeletal", sub: "Avg Days to 1st Visit: 14.2" },
        { id: "PR2", name: "Northside Chiropractic", sub: "Avg Days to 1st Visit: 18.5" }
    ];

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('#topNav a').forEach(a => { a.classList.remove('active'); a.removeAttribute('aria-current'); });
        document.getElementById(`nav-${mode}`).classList.add('active');
        document.getElementById(`nav-${mode}`).setAttribute('aria-current', 'page');
        document.getElementById('searchBox').placeholder = mode === 'patients' ? "Search Patients..." : "Search Practices...";
        document.getElementById('addBtn').classList.toggle('hidden', mode === 'patients');
        renderSidebar();
        renderOverview();
        clearSelection();
    }

    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        const items = currentMode === 'patients' ? patients : practices;
        list.innerHTML = items.map(i => `
            <button class="list-item" onclick="selectItem('${i.id}')" id="item-${i.id}">
                <span class="item-main">${i.name}</span>
                <span class="item-sub">${i.sub}</span>
            </button>
        `).join('');
    }

    function renderOverview() {
        const title = document.getElementById('overviewTitle');
        const sub = document.getElementById('overviewSub');
        const container = document.getElementById('overviewData');

        if (currentMode === 'patients') {
            title.innerText = "Summit Musculoskeletal Group";
            sub.innerText = "Practice Performance Overview";
            // Use the same hierarchy as practice pages
            container.innerHTML = `
                <div class="section-header"><h3>Daily Operations (Clinical Focus)</h3></div>
                <div class="daily-grid">
                    <div class="daily-stat"><span class="stat-label">Slot Density</span><span class="stat-value">92%</span></div>
                    <div class="daily-stat alert"><span class="stat-label">Unsigned Charts</span><span class="stat-value">12</span></div>
                    <div class="daily-stat alert"><span class="stat-label">Critical Labs</span><span class="stat-value">3</span></div>
                </div>
                <div class="section-header"><h3>Weekly Performance</h3></div>
                <div class="weekly-grid">
                    <div class="weekly-stat"><span class="stat-label">wRVUs</span><span class="stat-value">450</span></div>
                    <div class="weekly-stat"><span class="stat-label">Billing Lag</span><span class="stat-value">1.2d</span></div>
                    <div class="weekly-stat"><span class="stat-label">New Referrals</span><span class="stat-value">24</span></div>
                </div>
                <div class="table-container">
                    <div class="section-header"><h3>Monthly Revenue Cycle</h3></div>
                    <table class="table-custom">
                        <thead><tr><th>Metric</th><th>Current</th><th>Status</th></tr></thead>
                        <tbody>
                            <tr><td>A/R Aging (>90)</td><td>$14,200</td><td style="color:var(--secondary-red); font-weight:700;">Critical</td></tr>
                            <tr><td>Net Collection Ratio</td><td>96.2%</td><td style="color:green; font-weight:700;">Healthy</td></tr>
                        </tbody>
                    </table>
                </div>`;
        } else {
            title.innerText = "Network Management";
            sub.innerText = "Global Revenue Cycle Distribution";
            container.innerHTML = `<div class="daily-grid"><div class="daily-stat"><span class="stat-label">Active Practices</span><span class="stat-value">18</span></div></div>`;
        }
    }

    function selectItem(id) {
        document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`item-${id}`).classList.add('active');
        document.getElementById('overviewContainer').classList.add('hidden');
        document.getElementById('detailContainer').classList.remove('hidden');

        const header = document.getElementById('detailHeader');
        const content = document.getElementById('detailHierarchy');

        if (currentMode === 'patients') {
            const p = patients.find(i => i.id === id);
            header.innerHTML = `<div><h2 style="margin:0; font-size:1.8rem;">${p.name}</h2><div style="margin-top:5px; opacity:0.8;">DOB: ${p.dob} (Age: ${p.age})</div></div>`;
            
            content.innerHTML = `
                <div class="section-header"><h3>Daily Clinical Encounter</h3></div>
                <div class="daily-grid">
                    <div class="daily-stat"><span class="stat-label">Chief Complaint</span><span class="stat-value" style="font-size:1.5rem;">${p.complaint}</span></div>
                    <div class="daily-stat alert"><span class="stat-label">Allergies</span><span class="stat-value" style="font-size:1.5rem;">${p.allergies}</span></div>
                    <div class="daily-stat"><span class="stat-label">Vitals</span><span class="stat-value" style="font-size:1.5rem;">${p.vitals}</span></div>
                </div>
                <div class="weekly-grid">
                    <div class="weekly-stat" style="grid-column: span 2;"><span class="stat-label">Current Medications</span><p style="font-weight:700; margin-top:10px;">${p.meds}</p></div>
                </div>

                <div class="section-header"><h3>Weekly Care Coordination</h3></div>
                <div class="daily-grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="daily-stat"><span class="stat-label">Pain Trending</span><span class="stat-value" style="font-size:2rem;">7/10</span><span class="stat-sub">PROMIS Score: 58</span></div>
                    <div class="daily-stat"><span class="stat-label">Pending Orders</span><span class="stat-value" style="font-size:2rem;">1</span><span class="stat-sub">MRI Lumbar Spine</span></div>
                </div>

                <div class="table-container">
                    <div class="section-header"><h3>Monthly Outcome Assessment</h3></div>
                    <table class="table-custom">
                        <thead><tr><th>Area</th><th>Data Point</th><th>Status</th></tr></thead>
                        <tbody>
                            <tr><td>Medication Adherence</td><td>90% (8/9 Refills)</td><td style="color:green; font-weight:700;">Compliant</td></tr>
                            <tr><td>Treatment Response</td><td>+12% Mobility vs Baseline</td><td style="color:green; font-weight:700;">Improving</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="table-container">
                    <div class="section-header"><h3>Rarely Accessed (Deep History)</h3></div>
                    <table class="table-custom" style="font-size: 0.85rem;">
                        <thead><tr><th>Category</th><th>Details</th></tr></thead>
                        <tbody>
                            <tr><td>Surgical History</td><td>Appendectomy (2005), Left Knee Scope (2012)</td></tr>
                            <tr><td>Social History</td><td>Employment: Full-time Teacher. Non-smoker.</td></tr>
                        </tbody>
                    </table>
                </div>`;
        } else {
            // Practice Detail Logic (Same as before but with unified link)
            const pr = practices.find(i => i.id === id);
            header.innerHTML = `<div><h2 style="margin:0; font-size:1.8rem;">${pr.name}</h2></div>`;
            content.innerHTML = `<div class="section-header"><h3>Daily Operations</h3></div><div class="daily-grid"><div class="daily-stat"><span class="stat-label">Slot Density</span><span class="stat-value">92%</span></div></div>`;
        }
        document.getElementById('mainContent').scrollTop = 0;
    }

    function clearSelection() {
        document.getElementById('overviewContainer').classList.remove('hidden');
        document.getElementById('detailContainer').classList.add('hidden');
        document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
    }

    switchMode('patients');
</script>
</body>
</html>
