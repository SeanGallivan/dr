<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derived Results | Summit Musculoskeletal Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<a href="#mainContent" class="skip-link">Skip to main content</a>

<header role="banner">
    <a href="javascript:void(0)" class="logo-area" onclick="switchMode('patients')" aria-label="Derived Results Home">Derived Results</a>
    <nav id="topNav" aria-label="Main Navigation">
        <a href="javascript:void(0)" onclick="switchMode('patients')" id="nav-patients" class="active" aria-current="page">Dashboard</a>
        <a href="javascript:void(0)" onclick="switchMode('practices')" id="nav-practices">Practices</a>
        <a href="#" style="color:var(--secondary-red); margin-left: 4rem;">Sign Out</a>
    </nav>
</header>

<div class="wrapper">
    <aside class="sidebar">
        <div class="search-container">
            <label for="searchBox" class="sr-only">Search</label>
            <input type="text" id="searchBox" placeholder="Search Patients...">
            <button id="addBtn" class="btn btn-primary hidden" style="width:100%; margin-top:15px;">+ Add New Practice</button>
        </div>
        <nav class="list-container" id="sidebarList" aria-label="Entity List"></nav>
    </aside>

    <main id="mainContent" role="main" tabindex="-1">
        <div id="overviewContainer" class="view-section">
            <h1 id="overviewTitle" style="font-weight: 800; font-size: 2.8rem; margin:0; color:var(--primary-navy);"></h1>
            <p id="overviewSub" style="color:var(--text-muted); font-weight:600; margin-top:0.8rem;"></p>
            <div class="infographic-row" id="dashStats"></div>
        </div>

        <section id="detailContainer" class="hidden" aria-labelledby="vName">
            <div id="detailHeader" class="detail-header"></div>
            <div id="detailTabs" class="tab-bar" role="tablist"></div>
            <div id="detailBody" style="background:white;">
                </div>
            <div style="padding: 4rem; background: var(--bg-gray);">
                <button onclick="clearSelection()" class="btn btn-outline">← Back to Overview</button>
            </div>
        </section>
    </main>
</div>

<script>
    let currentMode = 'patients';

    const patients = [
        { id: "P1", name: "Elizabeth Blackwell", last: "Feb 24, 2026", next: "Mar 12, 2026", dob: "8/27/1984", age: 41, h: "70", w: "206", bmi: "29.60", adx: "Follow-up", sched: false },
        { id: "P2", name: "Jonas Salk", last: "Feb 22, 2026", next: "", dob: "10/28/1975", age: 50, h: "68", w: "185", bmi: "28.1", adx: "Post-Op", sched: true },
        { id: "P3", name: "Virginia Apgar", last: "Feb 19, 2026", next: "", dob: "6/07/1981", age: 44, h: "64", w: "140", bmi: "24.0", adx: "Initial Eval", sched: true },
        { id: "P4", name: "Charles Drew", last: "Feb 15, 2026", next: "Mar 18, 2026", dob: "6/03/1992", age: 33, h: "72", w: "210", bmi: "28.5", adx: "Injection", sched: false },
        { id: "P5", name: "Sigmund Freud", last: "Jan 30, 2026", next: "", dob: "5/06/1966", age: 59, h: "67", w: "160", bmi: "25.1", adx: "Imaging", sched: true },
        { id: "P6", name: "Marie Curie", last: "Jan 25, 2026", next: "", dob: "11/07/1989", age: 36, h: "62", w: "130", bmi: "23.8", adx: "Initial Eval", sched: true },
        { id: "P7", name: "Louis Pasteur", last: "Jan 20, 2026", next: "Mar 25, 2026", dob: "12/27/1978", age: 47, h: "66", w: "175", bmi: "28.2", adx: "Surgery", sched: false },
        { id: "P8", name: "Rosalind Franklin", last: "Jan 15, 2026", next: "", dob: "7/25/1990", age: 35, h: "65", w: "145", bmi: "24.1", adx: "Follow-up", sched: true },
        { id: "P9", name: "Florence Nightingale", last: "Jan 10, 2026", next: "", dob: "5/12/1985", age: 40, h: "64", w: "135", bmi: "23.2", adx: "Initial Eval", sched: true }
    ];

    const practices = [
        { id: "PR1", name: "Summit Musculoskeletal", days: "14.2" },
        { id: "PR2", name: "Northside Chiropractic", days: "18.5" },
        { id: "PR3", name: "Downtown Wellness", days: "11.0" },
        { id: "PR4", name: "Peak Orthopedics", days: "15.1" }
    ];

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('#topNav a').forEach(a => { a.classList.remove('active'); a.removeAttribute('aria-current'); });
        document.getElementById(`nav-${mode}`).classList.add('active');
        document.getElementById(`nav-${mode}`).setAttribute('aria-current', 'page');
        document.getElementById('searchBox').placeholder = mode === 'patients' ? "Search Patients..." : "Search Practices...";
        document.getElementById('addBtn').classList.toggle('hidden', mode === 'patients');
        renderSidebar();
        renderDashboard();
        clearSelection();
    }

    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        const items = currentMode === 'patients' ? patients : practices;
        list.innerHTML = items.map(i => `
            <button class="list-item" onclick="selectItem('${i.id}')" id="item-${i.id}">
                <span class="item-main">${i.name}</span>
                <span class="item-sub">${currentMode === 'patients' ? 'Last Seen: ' + i.last : 'Avg Days to 1st Visit: ' + i.days}</span>
            </button>
        `).join('');
    }

    function renderDashboard() {
        const stats = document.getElementById('dashStats');
        if (currentMode === 'patients') {
            document.getElementById('overviewTitle').innerText = "Summit Musculoskeletal Group";
            document.getElementById('overviewSub').innerText = "Clinical Performance Dashboard";
            stats.innerHTML = `
                <div class="daily-stat"><span class="stat-label">Total Patients</span><span class="stat-value">134</span></div>
                <div class="daily-stat"><span class="stat-label">Monthly Billing</span><span class="stat-value">$42,850</span></div>
                <div class="daily-stat"><span class="stat-label">Active Diagnoses</span><span class="stat-value">255</span></div>
            `;
        } else {
            document.getElementById('overviewTitle').innerText = "Network Management";
            document.getElementById('overviewSub').innerText = "Revenue Cycle Overview";
            stats.innerHTML = `
                <div class="daily-stat"><span class="stat-label">Active Practices</span><span class="stat-value">18</span></div>
                <div class="daily-stat"><span class="stat-label">Global A/R</span><span class="stat-value">$142k</span></div>
                <div class="daily-stat"><span class="stat-label">Total Claims</span><span class="stat-value">1,204</span></div>
            `;
        }
    }

    function selectItem(id) {
        document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`item-${id}`).classList.add('active');
        document.getElementById('overviewContainer').classList.add('hidden');
        document.getElementById('detailContainer').classList.remove('hidden');

        const header = document.getElementById('detailHeader');
        const tabs = document.getElementById('detailTabs');
        const body = document.getElementById('detailBody');

        if (currentMode === 'patients') {
            const p = patients.find(i => i.id === id);
            header.innerHTML = `<div><h2 id="vName" style="margin:0; font-size:1.8rem;">${p.name}</h2></div>`;
            tabs.innerHTML = `<button class="tab active">Clinical Information</button>`;
            body.innerHTML = `<div class="content-grid"><div class="left-col"><div class="data-section"><h3>At-a-glance</h3><div class="at-a-glance-grid"><div class="glance-item"><span class="stat-label">BMI</span><b>${p.bmi}</b></div><div class="glance-item"><span class="stat-label">Code</span><b>${p.adx}</b></div></div></div></div></div>`;
        } else {
            const pr = practices.find(i => i.id === id);
            header.innerHTML = `<div><h2 id="vName" style="margin:0; font-size:1.8rem;">${pr.name}</h2><div style="margin-top:10px; font-weight:700;">Performance & Revenue Cycle Report</div></div>`;
            tabs.innerHTML = `<button class="tab active">Operations</button><button class="tab">Physicians</button><button class="tab">Billing</button>`;
            
            body.innerHTML = `
                <div style="padding: 4rem;">
                    <div class="table-container"><h3>Daily Operations (Physician Priority)</h3></div>
                    <div class="infographic-row">
                        <div class="daily-stat"><span class="stat-label">Slot Density</span><span class="stat-value">92%</span><span class="stat-subtext">Schedule Utilization</span></div>
                        <div class="daily-stat"><span class="stat-label">No-Shows</span><span class="stat-value">4%</span><span class="stat-subtext">Cancellation Rate</span></div>
                        <div class="daily-stat critical"><span class="stat-label">Unsigned Charts</span><span class="stat-value">12</span><span class="stat-subtext">Immediate Action</span></div>
                        <div class="daily-stat"><span class="stat-label">POS Collected</span><span class="stat-value">$1,250</span><span class="stat-subtext">Daily Cash Flow</span></div>
                        <div class="daily-stat critical"><span class="stat-label">Critical Labs</span><span class="stat-value">3</span><span class="stat-subtext">Pending Review</span></div>
                    </div>

                    <div class="table-container"><h3>Weekly Productivity</h3></div>
                    <div class="infographic-row" style="gap:2rem;">
                        <div class="weekly-stat"><span class="stat-label">wRVUs</span><span class="stat-value" style="font-size:2rem;">450</span><span class="stat-subtext">Target: 420</span></div>
                        <div class="weekly-stat"><span class="stat-label">Billing Lag</span><span class="stat-value" style="font-size:2rem;">1.2d</span><span class="stat-subtext">Avg Days</span></div>
                        <div class="weekly-stat"><span class="stat-label">New Referrals</span><span class="stat-value" style="font-size:2rem;">24</span><span class="stat-subtext">Healthy Pipeline</span></div>
                        <div class="weekly-stat"><span class="stat-label">Staffing Ratio</span><span class="stat-value" style="font-size:2rem;">1:4</span><span class="stat-subtext">Staff per MD</span></div>
                    </div>

                    <div class="table-container">
                        <h3>Monthly Revenue Cycle (Admin Priority)</h3>
                        <table class="table-custom">
                            <thead><tr><th>Metric</th><th>Current Month</th><th>Target</th><th>Status</th></tr></thead>
                            <tbody>
                                <tr><td>A/R Aging (>90 Days)</td><td>$14,200</td><td>< $10,000</td><td style="color:var(--secondary-red); font-weight:700;">Needs Review</td></tr>
                                <tr><td>Net Collection Ratio</td><td>96.2%</td><td>95.0%</td><td style="color:green; font-weight:700;">Healthy</td></tr>
                                <tr><td>Claim Denial Rate</td><td>3.1%</td><td>< 5.0%</td><td style="color:green; font-weight:700;">Healthy</td></tr>
                                <tr><td>Payer Mix (Private)</td><td>68%</td><td>65%</td><td style="color:green; font-weight:700;">Healthy</td></tr>
                                <tr><td>Net Practice Revenue</td><td>$42,850</td><td>$40,000</td><td style="color:green; font-weight:700;">Above Target</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="table-container">
                        <h3>Long-term Strategic Data</h3>
                        <table class="table-custom" style="font-size: 0.85rem;">
                            <thead><tr><th>Area</th><th>Update Frequency</th><th>Current Status</th></tr></thead>
                            <tbody>
                                <tr><td>Patient Satisfaction (NPS)</td><td>Rarely (Annual)</td><td>88 (World Class)</td></tr>
                                <tr><td>Compliance Audit</td><td>Rarely (Annual)</td><td>Verified (Oct 2025)</td></tr>
                                <tr><td>Equipment Lifecycle</td><td>Rarely (Annual)</td><td>MRI Maintenance Scheduled</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }
        document.getElementById('mainContent').scrollTop = 0;
    }

    function clearSelection() {
        document.getElementById('overviewContainer').classList.remove('hidden');
        document.getElementById('detailContainer').classList.add('hidden');
        document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
    }

    switchMode('patients');
</script>
</body>
</html>
