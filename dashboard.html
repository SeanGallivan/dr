<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derived Results | Summit Musculoskeletal Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="logo-area">Derived Results</div>
    <nav id="topNav">
        <a onclick="switchMode('patients')" id="nav-patients" class="active">Dashboard</a>
        <a onclick="switchMode('practices')" id="nav-practices">Practices</a>
        <a href="#" style="color:var(--secondary-red); margin-left: 4rem;">Sign Out</a>
    </nav>
</header>

<div class="wrapper">
    <aside class="sidebar">
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="Search Patients...">
            <a href="#" id="addLink" class="hidden">+ Add New Practice</a>
        </div>
        <div class="list-container" id="sidebarList">
            </div>
    </aside>

    <main id="mainContent">
        <div id="overviewContainer" class="view-section">
            <h1 id="overviewTitle" style="font-weight: 800; font-size: 2.8rem; margin:0; color:var(--primary-navy);">Summit Musculoskeletal Group</h1>
            <p id="overviewSub" style="color:var(--text-muted); font-weight:600; margin-top:0.5rem;">Practice Performance Overview</p>
            
            <div class="stats-container" id="dashStats">
                </div>
        </div>

        <div id="detailContainer" class="hidden">
            <div id="detailHeader" class="detail-header">
                </div>
            
            <div class="content-grid" id="detailBody">
                </div>
            <button onclick="clearSelection()" style="margin: 0 3rem 4rem 3rem;" class="btn btn-outline">← Back to Overview</button>
        </div>
    </main>
</div>

<script>
    let currentMode = 'patients';

    const data = {
        patients: [
            { id: "P1", name: "Elizabeth Blackwell", last: "Feb 24, 2026", dob: "8/27/1984", age: 41, sub: "Last Seen: Feb 24" },
            { id: "P2", name: "Jonas Salk", last: "Feb 22, 2026", dob: "10/28/1975", age: 50, sub: "Last Seen: Feb 22" },
            { id: "P3", name: "Virginia Apgar", last: "Feb 19, 2026", dob: "6/07/1981", age: 44, sub: "Last Seen: Feb 19" }
        ],
        practices: [
            { id: "PR1", name: "Summit Musculoskeletal", days: "14.2", sub: "Avg Days to 1st Visit: 14.2" },
            { id: "PR2", name: "Northside Chiropractic", days: "18.5", sub: "Avg Days to 1st Visit: 18.5" },
            { id: "PR3", name: "Downtown Wellness", days: "11.0", sub: "Avg Days to 1st Visit: 11.0" }
        ]
    };

    function switchMode(mode) {
        currentMode = mode;
        // Update Nav UI
        document.querySelectorAll('#topNav a').forEach(a => a.classList.remove('active'));
        document.getElementById(`nav-${mode}`).classList.add('active');
        
        // Update Sidebar Header
        const search = document.getElementById('searchBox');
        const addLink = document.getElementById('addLink');
        search.placeholder = mode === 'patients' ? "Search Patients..." : "Search Practices...";
        addLink.classList.toggle('hidden', mode === 'patients');
        
        renderSidebar();
        renderDashboard();
        clearSelection();
    }

    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        list.innerHTML = data[currentMode].map(item => `
            <div class="list-item" onclick="selectItem('${item.id}')" id="item-${item.id}">
                <span class="item-main">${item.name}</span>
                <span class="item-sub">${item.sub}</span>
            </div>
        `).join('');
    }

    function renderDashboard() {
        const stats = document.getElementById('dashStats');
        if (currentMode === 'patients') {
            document.getElementById('overviewTitle').innerText = "Summit Musculoskeletal Group";
            document.getElementById('overviewSub').innerText = "Practice Performance Overview";
            stats.innerHTML = `
                <div class="stat-item"><span class="stat-label">Patients</span><span class="stat-value">134</span><a href="#" class="add-link">View Report →</a></div>
                <div class="stat-item"><span class="stat-label">Monthly Billing</span><span class="stat-value">$42,850</span><a href="#" class="add-link">View Financials →</a></div>
                <div class="stat-item"><span class="stat-label">Active Diagnoses</span><span class="stat-value">255</span><a href="#" class="add-link">View Clinical →</a></div>
            `;
        } else {
            document.getElementById('overviewTitle').innerText = "Network Practices";
            document.getElementById('overviewSub').innerText = "Global Practice Distribution";
            stats.innerHTML = `
                <div class="stat-item"><span class="stat-label">Total Practices</span><span class="stat-value">12</span><a href="#" class="add-link">Manage Network →</a></div>
                <div class="stat-item"><span class="stat-label">Total Patients</span><span class="stat-value">3,102</span><a href="#" class="add-link">Patient Map →</a></div>
                <div class="stat-item"><span class="stat-label">Total Billing</span><span class="stat-value">$142,000</span><a href="#" class="add-link">Network Revenue →</a></div>
            `;
        }
    }

    function selectItem(id) {
        document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`item-${id}`).classList.add('active');
        
        document.getElementById('overviewContainer').classList.add('hidden');
        document.getElementById('detailContainer').classList.remove('hidden');

        const item = data[currentMode].find(i => i.id === id);
        const header = document.getElementById('detailHeader');
        const body = document.getElementById('detailBody');

        if (currentMode === 'patients') {
            header.innerHTML = `<div><div style="font-size:1.8rem; font-weight:800;">${item.name}</div><div style="margin-top:5px; opacity:0.8;">DOB: ${item.dob} (Age: ${item.age})</div></div>`;
            body.innerHTML = `<div class="data-section"><h3>Clinical Overview</h3><p>MSK Pathway: Evaluation Complete. Diagnostic Imaging Pending.</p></div>`;
        } else {
            header.innerHTML = `<div><div style="font-size:1.8rem; font-weight:800;">${item.name}</div><div style="margin-top:5px; opacity:0.8;">Avg Pipeline: ${item.days} Days</div></div>`;
            body.innerHTML = `
                <div class="left-col">
                    <div class="data-section">
                        <h3>Practice Physicians</h3>
                        <table class="table-custom">
                            <thead><tr><th>Name</th><th>Specialty</th><th>Status</th></tr></thead>
                            <tbody>
                                <tr><td>Dr. Brad Vilims</td><td>Pain Management</td><td>Active</td></tr>
                                <tr><td>Dr. Loyal</td><td>Clinical Ops</td><td>Active</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="right-col">
                    <div class="data-section">
                        <h3>Administrative Staff</h3>
                        <ul style="font-weight:600; font-size:0.9rem;">
                            <li>Marty McGraw (Operations)</li>
                            <li>Chris (Records)</li>
                            <li>Rosie (Records)</li>
                        </ul>
                    </div>
                </div>`;
        }
        document.getElementById('mainContent').scrollTop = 0;
    }

    function clearSelection() {
        document.getElementById('overviewContainer').classList.remove('hidden');
        document.getElementById('detailContainer').classList.add('hidden');
        document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
    }

    switchMode('patients');
</script>
</body>
</html>
