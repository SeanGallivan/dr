<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derived Results | Summit Musculoskeletal Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<a href="#mainContent" class="skip-link">Skip to main content</a>

<header role="banner">
    <a href="#" class="logo-area" onclick="switchMode('patients')" aria-label="Derived Results Home">Derived Results</a>
    <nav id="topNav" aria-label="Main Navigation">
        <a href="javascript:void(0)" onclick="switchMode('patients')" id="nav-patients" class="active" aria-current="page">Dashboard</a>
        <a href="javascript:void(0)" onclick="switchMode('practices')" id="nav-practices">Practices</a>
        <a href="#" style="color:var(--secondary-red); margin-left: 4rem;">Sign Out</a>
    </nav>
</header>

<div class="wrapper">
    <aside class="sidebar" aria-label="Search and Filter">
        <div class="search-container">
            <label for="searchBox" class="sr-only">Search</label>
            <input type="text" id="searchBox" placeholder="Search Patients...">
            
            <button id="addBtn" class="btn btn-primary hidden" aria-label="Add New Practice">+ Add New Practice</button>
        </div>
        
        <nav class="list-container" id="sidebarList" aria-label="Entity List">
            </nav>
    </aside>

    <main id="mainContent" role="main" tabindex="-1">
        <div id="overviewContainer" class="view-section">
            <h1 id="overviewTitle" style="font-weight: 800; font-size: 2.8rem; margin:0; color:var(--primary-navy);"></h1>
            <p id="overviewSub" style="color:var(--text-muted); font-weight:600; margin-top:0.5rem;"></p>
            <div class="stats-container" id="dashStats"></div>
        </div>

        <section id="detailContainer" class="hidden" aria-labelledby="vName">
            <div id="detailHeader" class="detail-header"></div>
            <div id="detailTabs" class="tab-bar" role="tablist"></div>
            
            <div class="content-grid" id="detailBody"></div>
            
            <button onclick="clearSelection()" style="margin: 0 3rem 4rem 3rem;" class="btn btn-outline">
                <span aria-hidden="true">←</span> Back to Overview
            </button>
        </section>
    </main>
</div>

<script>
    let currentMode = 'patients';

    const patients = [
        { id: "P1", name: "Elizabeth Blackwell", last: "Feb 24, 2026", next: "Mar 12, 2026", dob: "8/27/1984", age: 41, h: "70", w: "206", bmi: "29.60", adx: "Follow-up", sched: false },
        { id: "P2", name: "Jonas Salk", last: "Feb 22, 2026", next: "", dob: "10/28/1975", age: 50, h: "68", w: "185", bmi: "28.1", adx: "Post-Op", sched: true },
        { id: "P3", name: "Virginia Apgar", last: "Feb 19, 2026", next: "", dob: "6/07/1981", age: 44, h: "64", w: "140", bmi: "24.0", adx: "Initial Eval", sched: true },
        { id: "P4", name: "Charles Drew", last: "Feb 15, 2026", next: "Mar 18, 2026", dob: "6/03/1992", age: 33, h: "72", w: "210", bmi: "28.5", adx: "Injection", sched: false },
        { id: "P5", name: "Sigmund Freud", last: "Jan 30, 2026", next: "", dob: "5/06/1966", age: 59, h: "67", w: "160", bmi: "25.1", adx: "Imaging", sched: true }
    ];

    const practices = [
        { id: "PR1", name: "Summit Musculoskeletal", days: "14.2" },
        { id: "PR2", name: "Northside Chiropractic", days: "18.5" },
        { id: "PR3", name: "Downtown Wellness", days: "11.0" }
    ];

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('#topNav a').forEach(a => {
            a.classList.remove('active');
            a.removeAttribute('aria-current');
        });
        document.getElementById(`nav-${mode}`).classList.add('active');
        document.getElementById(`nav-${mode}`).setAttribute('aria-current', 'page');
        
        const search = document.getElementById('searchBox');
        const addBtn = document.getElementById('addBtn');
        search.placeholder = mode === 'patients' ? "Search Patients..." : "Search Practices...";
        addBtn.classList.toggle('hidden', mode === 'patients');
        
        renderSidebar();
        renderDashboard();
        clearSelection();
    }

    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        const items = currentMode === 'patients' ? patients : practices;
        list.innerHTML = items.map(i => `
            <button class="list-item" onclick="selectItem('${i.id}')" id="item-${i.id}" aria-label="View details for ${i.name}">
                <span class="item-main">${i.name}</span>
                <span class="item-sub">${currentMode === 'patients' ? 'Last Seen: ' + i.last : 'Avg Days to 1st Visit: ' + i.days}</span>
            </button>
        `).join('');
    }

    function renderDashboard() {
        const title = document.getElementById('overviewTitle');
        const sub = document.getElementById('overviewSub');
        const stats = document.getElementById('dashStats');
        if (currentMode === 'patients') {
            title.innerText = "Summit Musculoskeletal Group";
            sub.innerText = "Practice Performance Overview";
            stats.innerHTML = `
                <div class="stat-item"><span class="stat-label">Patients</span><span class="stat-value">134</span></div>
                <div class="stat-item"><span class="stat-label">Monthly Billing</span><span class="stat-value">$42,850</span></div>
                <div class="stat-item"><span class="stat-label">Active Diagnoses</span><span class="stat-value">255</span></div>`;
        } else {
            title.innerText = "Network Practices";
            sub.innerText = "Global Practice Distribution";
            stats.innerHTML = `
                <div class="stat-item"><span class="stat-label">Total Practices</span><span class="stat-value">18</span></div>
                <div class="stat-item"><span class="stat-label">Total Patients</span><span class="stat-value">3,102</span></div>
                <div class="stat-item"><span class="stat-label">Total Billing</span><span class="stat-value">$142k</span></div>`;
        }
    }

    function selectItem(id) {
        document.querySelectorAll('.list-item').forEach(i => {
            i.classList.remove('active');
            i.removeAttribute('aria-selected');
        });
        const activeItem = document.getElementById(`item-${id}`);
        activeItem.classList.add('active');
        activeItem.setAttribute('aria-selected', 'true');
        
        document.getElementById('overviewContainer').classList.add('hidden');
        document.getElementById('detailContainer').classList.remove('hidden');
        
        const header = document.getElementById('detailHeader');
        const tabs = document.getElementById('detailTabs');
        const body = document.getElementById('detailBody');

        if (currentMode === 'patients') {
            const p = patients.find(i => i.id === id);
            header.innerHTML = `<div><h2 id="vName" style="margin:0; font-size:1.8rem;">${p.name}</h2><div style="margin-top:8px;">${p.sched ? '<a class="schedule-link">Schedule Next Visit →</a>' : 'Next Visit: ' + p.next}</div></div><div class="header-meta">Age: ${p.age}</div>`;
            tabs.innerHTML = `<button class="tab active" role="tab" aria-selected="true">Information</button><button class="tab" role="tab">Clinical</button>`;
            body.innerHTML = `<div class="data-section"><h3>At-a-glance</h3><div class="at-a-glance-grid"><div class="glance-item"><span class="stat-label">BMI</span><b>${p.bmi}</b></div><div class="glance-item"><span class="stat-label">Code</span><b>${p.adx}</b></div></div></div>`;
        } else {
            const pr = practices.find(i => i.id === id);
            header.innerHTML = `<div><h2 id="vName" style="margin:0; font-size:1.8rem;">${pr.name}</h2><div style="margin-top:5px; opacity:0.8;">Pipeline: ${pr.days} Days</div></div>`;
            tabs.innerHTML = `<button class="tab active" role="tab">Roster</button><button class="tab" role="tab">Billing</button>`;
            body.innerHTML = `<div class="data-section"><h3>Physicians</h3><p>Dr. Brad Vilims, Dr. Loyal</p></div>`;
        }
        document.getElementById('mainContent').focus(); // Move focus to content for accessibility
    }

    function clearSelection() {
        document.getElementById('overviewContainer').classList.remove('hidden');
        document.getElementById('detailContainer').classList.add('hidden');
        document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
    }

    switchMode('patients');
</script>
</body>
</html>
