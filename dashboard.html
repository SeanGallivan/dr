<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derived Results | Unified MSK Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<a href="#mainContent" class="skip-link">Skip to main content</a>

<header role="banner">
    <a href="javascript:void(0)" class="logo-area" onclick="switchMode('patients')" aria-label="Derived Results Home">Derived Results</a>
    <nav id="topNav" aria-label="Main Navigation">
        <a href="javascript:void(0)" onclick="switchMode('patients')" id="nav-patients" class="active" aria-current="page">Dashboard</a>
        <a href="javascript:void(0)" onclick="switchMode('practices')" id="nav-practices">Practices</a>
        <a href="#" style="color:var(--secondary-red); margin-left: 4rem;">Sign Out</a>
    </nav>
</header>

<div class="wrapper">
    <aside class="sidebar">
        <div class="search-container">
            <label for="searchBox" class="sr-only">Search</label>
            <input type="text" id="searchBox" placeholder="Search Patients...">
            <button id="addBtn" class="btn btn-primary hidden" style="width:100%; margin-top:15px;">+ Add New Practice</button>
        </div>
        <nav class="list-container" id="sidebarList" aria-label="Entity List"></nav>
    </aside>

    <main id="mainContent" role="main" tabindex="-1">
        <div id="overviewContainer" class="view-section">
            <h1 id="overviewTitle" style="font-weight: 800; font-size: 2.8rem; margin:0; color:var(--primary-navy);"></h1>
            <p id="overviewSub" style="color:var(--text-muted); font-weight:600; margin-top:0.8rem;"></p>
            <div id="practiceContent"></div>
        </div>

        <section id="detailContainer" class="hidden">
            <div id="detailHeader" class="detail-header"></div>
            <div id="detailContent" class="view-section" style="padding-top: 2rem; background:white;">
                <div id="detailHierarchy"></div>
            </div>
        </section>
    </main>
</div>

<script>
    let currentMode = 'patients';

    // 25 Patient Recovery
    const patients = [
        { id: "P1", name: "Elizabeth Blackwell", last: "Feb 24, 2026", dob: "8/27/1984", age: 41, complaint: "Lower Back Pain", allergies: "Penicillins", meds: "Naproxen 500mg", vitals: "128/82 | 165 lbs", summary: "L4-L5 Stenosis. Continue PT.", sub: "Last Seen: Feb 24" },
        { id: "P2", name: "Jonas Salk", last: "Feb 22, 2026", dob: "10/28/1975", age: 50, complaint: "Lumbar Follow-up", allergies: "Latex", meds: "Oxycodone", vitals: "135/88 | 185 lbs", summary: "Post-op check. Incision healing.", sub: "Last Seen: Feb 22" },
        { id: "P3", name: "Virginia Apgar", last: "Feb 19, 2026", dob: "6/07/1981", age: 44, complaint: "Hip Flare-up", allergies: "None", meds: "Ibuprofen", vitals: "120/75 | 140 lbs", summary: "Bursitis suspected. Order MRI.", sub: "Last Seen: Feb 19" },
        { id: "P4", name: "Charles Drew", last: "Feb 15, 2026", dob: "6/03/1992", age: 33, complaint: "Neck Stiffness", allergies: "Aspirin", meds: "None", vitals: "118/72 | 210 lbs", summary: "Cervical strain. Ergo assessment.", sub: "Last Seen: Feb 15" },
        { id: "P5", name: "Sigmund Freud", last: "Jan 30, 2026", dob: "5/06/1966", age: 59, complaint: "Hand Numbness", allergies: "None", meds: "Gabapentin", vitals: "130/80 | 160 lbs", summary: "Carpal Tunnel. Wrist splinting.", sub: "Last Seen: Jan 30" }
    ];
    // Add dummy patients to fill scroll
    for(let i=6; i<=25; i++) { patients.push({...patients[0], id: "P"+i, name: "Patient Record #"+i, sub: "Archive Record"}); }

    const practices = [
        { id: "PR1", name: "Summit Musculoskeletal", days: "14.2" },
        { id: "PR2", name: "Northside Chiropractic", days: "18.5" },
        { id: "PR3", name: "Downtown Wellness", days: "11.0" },
        { id: "PR4", name: "Peak Orthopedics", days: "15.1" }
    ];
    for(let i=5; i<=18; i++) { practices.push({...practices[0], id: "PR"+i, name: "Clinic Location #"+i, days: "12.0"}); }

    const practiceHierarchyHTML = `
        <a onclick="clearSelection()" class="back-link">← Back to dashboard</a>
        <div class="section-header"><h3>Daily Operations (Clinical Focus)</h3></div>
        <div class="daily-grid">
            <div class="daily-stat"><span class="stat-label">Slot Density</span><span class="stat-value">92%</span><span class="stat-sub">Utilization</span></div>
            <div class="daily-stat alert"><span class="stat-label">Unsigned Charts</span><span class="stat-value">12</span><span class="stat-sub">Action Required</span></div>
            <div class="daily-stat alert"><span class="stat-label">Critical Labs</span><span class="stat-value">3</span><span class="stat-sub">Pending Review</span></div>
            <div class="daily-stat"><span class="stat-label">POS Collected</span><span class="stat-value">$1,250</span><span class="stat-sub">Daily Cash</span></div>
        </div>
        <div class="section-header"><h3>Weekly Performance</h3></div>
        <div class="weekly-grid">
            <div class="weekly-stat"><span class="stat-label">Work RVUs</span><span class="stat-value">450</span><span class="stat-sub">Target: 420</span></div>
            <div class="weekly-stat"><span class="stat-label">Billing Lag</span><span class="stat-value">1.2d</span><span class="stat-sub">Avg Days</span></div>
            <div class="weekly-stat"><span class="stat-label">New Referrals</span><span class="stat-value">24</span><span class="stat-sub">Healthy Pipeline</span></div>
        </div>
        <div class="table-container">
            <div class="section-header"><h3>Monthly Revenue Cycle (Admin Focus)</h3></div>
            <table class="table-custom">
                <thead><tr><th>Metric</th><th>Current</th><th>Target</th><th>Health</th></tr></thead>
                <tbody>
                    <tr><td>A/R Aging (>90)</td><td>$14,200</td><td>< $10k</td><td style="color:var(--secondary-red); font-weight:700;">Critical</td></tr>
                    <tr><td>Net Collection Ratio</td><td>96.2%</td><td>95.0%</td><td style="color:green; font-weight:700;">Healthy</td></tr>
                    <tr><td>Claim Denial Rate</td><td>3.1%</td><td>< 5%</td><td style="color:green; font-weight:700;">Healthy</td></tr>
                </tbody>
            </table>
        </div>
        <div class="table-container">
            <div class="section-header"><h3>Strategic Marker Reports</h3></div>
            <table class="table-custom" style="font-size:0.9rem;">
                <thead><tr><th>Area</th><th>Frequency</th><th>Status</th></tr></thead>
                <tbody>
                    <tr><td>Patient NPS Score</td><td>Annual</td><td>88 (World Class)</td></tr>
                    <tr><td>Compliance Audit</td><td>Annual</td><td>Verified (Oct 2025)</td></tr>
                </tbody>
            </table>
        </div>`;

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('#topNav a').forEach(a => { a.classList.remove('active'); a.removeAttribute('aria-current'); });
        document.getElementById(`nav-${mode}`).classList.add('active');
        document.getElementById(`nav-${mode}`).setAttribute('aria-current', 'page');
        document.getElementById('searchBox').placeholder = mode === 'patients' ? "Search Patients..." : "Search Practices...";
        document.getElementById('addBtn').classList.toggle('hidden', mode === 'patients');
        renderSidebar();
        renderOverview();
        clearSelection();
    }

    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        const items = currentMode === 'patients' ? patients : practices;
        list.innerHTML = items.map(i => `
            <button class="list-item" onclick="selectItem('${i.id}')" id="item-${i.id}">
                <span class="item-main">${i.name}</span>
                <span class="item-sub">${currentMode === 'patients' ? i.sub : 'Avg Pipeline: ' + i.days + ' Days'}</span>
            </button>
        `).join('');
    }

    function renderOverview() {
        const title = document.getElementById('overviewTitle');
        const sub = document.getElementById('overviewSub');
        const content = document.getElementById('practiceContent');
        if (currentMode === 'patients') {
            title.innerText = "Summit Musculoskeletal Group";
            sub.innerText = "HQ Operations Dashboard";
            content.innerHTML = practiceHierarchyHTML;
            content.querySelector('.back-link').classList.add('hidden');
        } else {
            title.innerText = "Network Management";
            sub.innerText = "Global Practice Distribution";
            content.innerHTML = `<div class="daily-grid"><div class="daily-stat"><span class="stat-label">Active Locations</span><span class="stat-value">18</span></div></div>`;
        }
    }

    function selectItem(id) {
        document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`item-${id}`).classList.add('active');
        document.getElementById('overviewContainer').classList.add('hidden');
        document.getElementById('detailContainer').classList.remove('hidden');

        const header = document.getElementById('detailHeader');
        const hierarchy = document.getElementById('detailHierarchy');

        if (currentMode === 'patients') {
            const p = patients.find(i => i.id === id);
            header.innerHTML = `<div><h2 style="margin:0; font-size:1.8rem;">${p.name}</h2><div style="margin-top:5px; opacity:0.8;">DOB: ${p.dob} (Age: ${p.age})</div></div><div class="header-meta">ID: ${p.id}</div>`;
            
            hierarchy.innerHTML = `
                <a onclick="clearSelection()" class="back-link">← Back to dashboard</a>
                <div class="section-header"><h3>Daily Clinical Encounter</h3></div>
                <div class="daily-grid">
                    <div class="daily-stat"><span class="stat-label">Chief Complaint</span><span class="stat-value" style="font-size:1.5rem;">${p.complaint}</span></div>
                    <div class="daily-stat alert"><span class="stat-label">Allergies</span><span class="stat-value" style="font-size:1.5rem;">${p.allergies}</span></div>
                    <div class="daily-stat"><span class="stat-label">Vitals</span><span class="stat-value" style="font-size:1.5rem;">${p.vitals}</span></div>
                </div>
                <div class="section-header"><h3>Weekly Care Coordination</h3></div>
                <div class="weekly-grid">
                    <div class="weekly-stat" style="grid-column: span 2;"><span class="stat-label">Active Problem List</span><p style="font-weight:700; font-size:1.2rem; margin-top:10px;">L4-L5 Spinal Stenosis (M54.16)</p></div>
                    <div class="weekly-stat"><span class="stat-label">Pain Trending</span><span class="stat-value">7/10</span></div>
                </div>
                <div class="table-container">
                    <div class="section-header"><h3>Outcome Assessment & History</h3></div>
                    <table class="table-custom">
                        <thead><tr><th>Category</th><th>Details</th><th>Status</th></tr></thead>
                        <tbody>
                            <tr><td>Medication Adherence</td><td>${p.meds} - Consistent</td><td style="color:green; font-weight:700;">Healthy</td></tr>
                            <tr><td>Last Visit Summary</td><td>${p.summary}</td><td>Complete</td></tr>
                            <tr><td>Surgical History</td><td>Appendectomy (2005)</td><td>Archive</td></tr>
                        </tbody>
                    </table>
                </div>`;
        } else {
            const pr = practices.find(i => i.id === id);
            header.innerHTML = `<div><h2 style="margin:0; font-size:1.8rem;">${pr.name}</h2></div>`;
            hierarchy.innerHTML = practiceHierarchyHTML;
        }
        document.getElementById('mainContent').scrollTop = 0;
    }

    function clearSelection() {
        document.getElementById('overviewContainer').classList.remove('hidden');
        document.getElementById('detailContainer').classList.add('hidden');
        document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
    }

    switchMode('patients');
</script>
</body>
</html>
