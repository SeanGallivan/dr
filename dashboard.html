<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Derived Results | MSK Hierarchy Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#mainContent" class="skip-link">Skip to main content</a>
    <header role="banner">
        <a href="javascript:void(0)" class="logo-area" onclick="switchMode('patients')" aria-label="Derived Results Home">Derived Results</a>
        <nav id="topNav">
            <a onclick="switchMode('patients')" id="nav-patients" class="active">Dashboard</a>
            <a onclick="switchMode('practices')" id="nav-practices">Practices</a>
            <a href="#" style="color:var(--secondary-red); margin-left: 3rem;">Sign Out</a>
        </nav>
    </header>

    <div class="wrapper">
        <aside class="sidebar">
            <div class="search-container">
                <input type="text" id="searchBox" placeholder="Search Patients...">
                <button id="addBtn" class="btn btn-primary hidden" style="width:100%; margin-top:10px;">+ Add New Practice</button>
            </div>
            <nav class="list-container" id="sidebarList"></nav>
        </aside>

        <main id="mainContent" role="main" tabindex="-1">
            <div id="overviewContainer" class="view-section">
                <h1 id="overviewTitle" style="font-weight: 800; font-size: 2.8rem; margin:0; color:var(--primary-navy);"></h1>
                <p id="overviewSub" style="color:var(--text-muted); font-weight:600; margin-top:0.8rem;"></p>
                <div id="practiceContent"></div>
            </div>
            <section id="detailContainer" class="hidden">
                <div id="detailHeader" class="detail-header"></div>
                <div id="detailBody" class="view-section" style="background:white; padding-top:2rem;">
                    <a onclick="clearSelection()" class="back-link">← Back to dashboard</a>
                    <div id="hierarchyTarget"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="mock-data.js"></script>
    <script src="templates.js"></script>
    <script>
        let currentMode = 'patients';

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('#topNav a').forEach(a => a.classList.remove('active'));
            document.getElementById(`nav-${mode}`).classList.add('active');
            document.getElementById('searchBox').placeholder = mode === 'patients' ? "Search Patients..." : "Search Practices...";
            document.getElementById('addBtn').classList.toggle('hidden', mode === 'patients');
            renderSidebar();
            renderOverview();
            clearSelection();
        }

        function renderSidebar() {
            const list = document.getElementById('sidebarList');
            const items = currentMode === 'patients' ? PATIENTS : PRACTICES;
            list.innerHTML = items.map(i => `
                <button class="list-item" onclick="selectItem('${i.id}')" id="item-${i.id}">
                    <span class="item-main">${i.name}</span>
                    <span class="item-sub">${currentMode === 'patients' ? i.sub : 'Avg Pipeline: ' + i.days + ' Days'}</span>
                </button>
            `).join('');
        }

        function renderOverview() {
            const title = document.getElementById('overviewTitle');
            const sub = document.getElementById('overviewSub');
            const content = document.getElementById('practiceContent');
            if (currentMode === 'patients') {
                title.innerText = "Summit Musculoskeletal Group";
                sub.innerText = "HQ Operations Dashboard";
                content.innerHTML = TEMPLATES.practiceHierarchy(PRACTICES[0]);
            } else {
                title.innerText = "Network Management";
                sub.innerText = "Global Practice Distribution";
                content.innerHTML = `<div class="daily-grid"><div class="daily-stat"><span class="stat-label">Active Locations</span><span class="stat-value">18</span></div></div>`;
            }
        }

        function selectItem(id) {
            document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`item-${id}`).classList.add('active');
            document.getElementById('overviewContainer').classList.add('hidden');
            document.getElementById('detailContainer').classList.remove('hidden');

            const header = document.getElementById('detailHeader');
            const target = document.getElementById('hierarchyTarget');

            if (currentMode === 'patients') {
                const p = PATIENTS.find(i => i.id === id);
                header.innerHTML = `<div><h2 style="margin:0; font-size:1.8rem;">${p.name}</h2><div style="margin-top:5px; opacity:0.8;">DOB: ${p.dob} (Age: ${p.age})</div></div>`;
                target.innerHTML = TEMPLATES.patientHierarchy(p);
            } else {
                const pr = PRACTICES.find(i => i.id === id);
                header.innerHTML = `<div><h2 style="margin:0; font-size:1.8rem;">${pr.name}</h2></div>`;
                target.innerHTML = TEMPLATES.practiceHierarchy(pr);
            }
            document.getElementById('mainContent').scrollTop = 0;
        }

        function clearSelection() {
            document.getElementById('overviewContainer').classList.remove('hidden');
            document.getElementById('detailContainer').classList.add('hidden');
            document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
        }

        switchMode('patients');
    </script>
</body>
</html>
