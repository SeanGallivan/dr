<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derived Results | Doctor Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=9">
</head>
<body style="overflow:auto;">
    <a href="#detailBody" class="skip-link">Skip to main content</a>
    <header>
        <div class="header-brand">
            <a class="logo-area" href="dashboard.html?view=DR_BRAD&tier=daily">DERIVED&nbsp;RESULTS</a>
            <span class="adx-brand-sep"></span>
            <span class="adx-eyebrow">Doctor Detail</span>
        </div>
        <div class="adx-header-right">
            <button id="adxThemeToggle" class="adx-theme-toggle" onclick="adxToggleTheme()"
                    aria-label="Toggle light / dark theme" aria-pressed="false" type="button">
                <span class="knob">☀</span>
            </button>
            <div class="adx-avatar" aria-hidden="true">BV</div>
        </div>
    </header>
    <div id="detailHeader" class="detail-header"></div>
    <main id="detailBody" class="adx-detail-body" tabindex="-1"></main>

    <script src="./adx-data.js?v=9"></script>
    <script src="./adx-config.js?v=9"></script>
    <script>
    (function () {
        var params = new URLSearchParams(location.search);
        var view = params.get("view") || "DR_BRAD";
        var p = adxProvider(params.get("id")) || ADX_PROVIDERS[1];
        function money(n){ return "$" + Number(n).toLocaleString(); }
        function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
        function roleLabel(r){ return {admin:"Administrator",ipm:"IPM Physician",network:"Network Physician"}[r]||r; }

        document.title = "ADX | " + p.name + " — Doctor Detail";
        document.getElementById("detailHeader").innerHTML =
            '<div><h2 style="margin:0;">' + esc(p.name) + '</h2>' +
            '<div style="font-size:0.85rem; opacity:0.85; margin-top:4px;">' + roleLabel(p.role) + ' · ' + esc(p.specialty) + (p.org ? ' · ' + esc(p.org) : '') + '</div></div>' +
            '<div class="header-actions"><button class="btn btn-action" onclick="alert(\'Message sent to ' + esc(p.name) + '.\')">Message Doctor</button></div>';

        var n = ADX_NETWORK_NORMS;
        var theirCases = ADX_CASES.filter(function(c){ return c.ipmId === p.id || (c.teamProviderIds||[]).indexOf(p.id) >= 0; });
        var agg = aggregateBonus(theirCases);
        var well = theirCases.filter(function(c){ return (c.pifCurrent - c.pifStart) >= 3; });
        var poorly = theirCases.filter(function(c){ return (c.pifCurrent - c.pifStart) <= 1 || c.scheduling === "No-show"; });

        var html = '<a class="adx-back" href="dashboard.html?view=' + view + '&tier=weekly"><span aria-hidden="true">←</span> Back to dashboard</a>';

        if (p.composite != null) {
            html +=
                '<div class="section-header"><h3>Composite Score ' + adxInfo("composite") + ' <span style="font-size:0.62rem; font-weight:800; color:#888;">[DR]</span></h3></div>' +
                '<div class="clinical-scorecard">' +
                    '<div class="scorecard-card"><div class="scorecard-label">Composite Score ' + adxInfo("composite") + '</div><div class="scorecard-value">' + p.composite + '</div><div class="scorecard-sub">Network avg: ' + n.composite + '</div></div>' +
                    '<div class="scorecard-card"><div class="scorecard-label">Aggregate Bonus ' + adxInfo("bonus") + '</div><div class="scorecard-value">' + agg.total + '</div><div class="scorecard-sub">points across ' + agg.count + ' patient/diagnosis pairs · avg ' + agg.avg + '</div></div>' +
                    '<div class="scorecard-card"><div class="scorecard-label">Bonus Eligibility ' + adxInfo("bonus") + '</div><div class="scorecard-value" style="font-size:1.6rem;">' + (agg.eligible ? "Eligible" : "Not yet") + '</div><div class="scorecard-sub">avg ' + agg.avg + ' vs ' + ADX_BONUS_POINTS_THRESHOLD + ' needed / pair</div></div>' +
                '</div>' +
                '<p class="adx-sub">The composite combines <strong>clinical-outcome</strong> components (PIFs, Time to MBT) with <strong>management</strong> components (cost, return to work). <strong>Bonus is aggregated from each patient/diagnosis pair</strong> (see the combinations below), not collapsed to the patient. The official ADX weighting is pending; this view shows the components and how they compare to the network norm — not a formula.</p>' +

                '<div class="section-header"><h3>Score Components vs Network Norm</h3></div>' +
                '<table class="table-custom"><thead><tr><th>Component</th><th>Category</th><th>This Doctor</th><th>Network Norm</th><th>Read</th></tr></thead><tbody>' +
                    compRow("PIFs Median Gain", "pif", "clinical", "+" + p.pifMedianGain.toFixed(1), "+3.4", p.pifMedianGain >= 3.4) +
                    compRow("Avg Days in ADX", "avg-days", "clinical", p.avgDaysInADX, n.avgDaysInADX, p.avgDaysInADX <= n.avgDaysInADX) +
                    compRow("Return to Work", "rtw", "management", Math.round(p.returnToWork*100)+"%", Math.round(n.returnToWork*100)+"%", p.returnToWork >= n.returnToWork) +
                    compRow("Avg Cost / Case", "avg-cost", "management", money(p.avgCostPerCase), money(n.avgCostPerCase), p.avgCostPerCase <= n.avgCostPerCase) +
                '</tbody></table>';
        }

        html +=
            '<div class="section-header"><h3>Doing Well vs Poorly — by patient / diagnosis <span style="font-size:0.62rem; font-weight:800; color:#888;">[DR]</span></h3></div>' +
            '<div class="deep-grid">' +
                '<div class="deep-card" style="border-left:4px solid var(--green);"><h4>Doing Well (' + well.length + ')</h4><p>' +
                (well.map(function(c){ return '<a class="adx-link" href="case-detail.html?id=' + c.id + '&view=' + view + '">' + esc(c.beneficiary) + '</a> · ' + esc(c.diagnosis) + ' — PIFs +' + (c.pifCurrent - c.pifStart); }).join("<br>") || "—") + '</p></div>' +
                '<div class="deep-card alert-card"><h4>Needs Attention (' + poorly.length + ')</h4><p>' +
                (poorly.map(function(c){ return '<a class="adx-link" href="case-detail.html?id=' + c.id + '&view=' + view + '">' + esc(c.beneficiary) + '</a> · ' + esc(c.diagnosis) + ' — ' + (c.scheduling==="No-show"?"no-show":"PIFs +" + (c.pifCurrent - c.pifStart)); }).join("<br>") || "—") + '</p></div>' +
            '</div>' +

            (function(){
                /* Patient / diagnosis combinations — by diagnosis, aggregated into a total. */
                var combos = theirCases.slice().sort(function(a,b){ return a.diagnosis < b.diagnosis ? -1 : (a.diagnosis > b.diagnosis ? 1 : (a.beneficiary < b.beneficiary ? -1 : 1)); });
                var sumRT = combos.reduce(function(s,c){ return s + c.runningTotal; }, 0);
                var sumPts = combos.reduce(function(s,c){ return s + caseBonusPoints(c); }, 0);
                return '<div class="section-header"><h3>Patient / Diagnosis Combinations (' + combos.length + ') ' + adxInfo("bonus-points") + ' <span style="font-size:0.62rem; font-weight:800; color:#888;">[DR]</span></h3></div>' +
                '<table class="adx-table"><thead><tr><th scope="col">Patient</th><th scope="col">Diagnosis</th><th scope="col" style="text-align:right;">PIFs ' + adxInfo("pif") + '</th><th scope="col" style="text-align:right;">Running Total ' + adxInfo("running-total") + '</th><th scope="col" style="text-align:right;">Bonus Pts ' + adxInfo("bonus-points") + '</th><th scope="col">Status ' + adxInfo("status") + '</th></tr></thead><tbody>' +
                    combos.map(function(c){ var g = c.pifCurrent - c.pifStart; return '<tr><td data-label="Patient"><a class="adx-link" href="case-detail.html?id=' + c.id + '&view=' + view + '">' + esc(c.beneficiary) + '</a></td>' +
                        '<td data-label="Diagnosis">' + esc(c.diagnosis) + '</td>' +
                        '<td data-label="PIFs" style="text-align:right;"><span class="adx-mono">' + c.pifStart + '→' + c.pifCurrent + ' <span class="' + (g>0?"adx-ok-text":"adx-muted") + '">' + (g>0?"+"+g:(g<0?g:"±0")) + '</span></span></td>' +
                        '<td data-label="Running Total" style="text-align:right;"><span class="adx-money">' + money(c.runningTotal) + '</span></td>' +
                        '<td data-label="Bonus Pts" style="text-align:right;"><span class="adx-mono">' + caseBonusPoints(c) + '</span></td>' +
                        '<td data-label="Status">' + esc(c.status) + '</td></tr>'; }).join("") +
                    '<tr class="adx-total-row"><td><strong>Total — ' + combos.length + ' combinations</strong></td><td></td><td></td>' +
                        '<td style="text-align:right;"><span class="adx-money">' + money(sumRT) + '</span></td>' +
                        '<td style="text-align:right;"><span class="adx-mono"><strong>' + sumPts + '</strong></span></td><td></td></tr>' +
                '</tbody></table>';
            })();

        document.getElementById("detailBody").innerHTML = html;

        function compRow(label, infoKey, kind, mine, norm, good){
            var cat = kind === "clinical"
                ? '<span class="adx-cat adx-cat-clinical">Clinical outcome</span>'
                : '<span class="adx-cat adx-cat-mgmt">Management</span>';
            return '<tr><td><b>' + label + '</b> ' + adxInfo(infoKey) + '</td><td>' + cat + '</td><td>' + mine + '</td><td>' + norm + '</td><td>' +
                (good ? '<span class="adx-delta-good">▲ at/above norm</span>' : '<span class="adx-delta-bad">▼ below norm</span>') + '</td></tr>';
        }
    })();
    </script>
</body>
</html>
